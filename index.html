<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0e0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claude">
<link rel="manifest" href="manifest.json">
<title>Claude · Чат</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #111;
  --border: #2a2a2a;
  --accent: #e8d5a3;
  --accent2: #7eb8d4;
  --green: #6dbf8a;
  --red: #c0392b;
  --text: #e4e4e4;
  --muted: #505050;
  --sidebar-w: 290px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px; line-height: 1.6;
}

/* ── APP SHELL ── */
#app { display: flex; height: 100dvh; position: relative; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.26s cubic-bezier(.4,0,.2,1);
  z-index: 40;
}
#sidebar.open { transform: translateX(0); }

#overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity 0.26s;
}
#overlay.show { opacity: 1; pointer-events: all; }

.sb-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.sb-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
}
.btn-new-chat {
  background: var(--accent); border: none; border-radius: 4px;
  color: #0e0e0e; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 600; padding: 5px 11px; cursor: pointer;
}

#chatList { flex: 1; overflow-y: auto; padding: 4px 0; }
#chatList::-webkit-scrollbar { width: 3px; }
#chatList::-webkit-scrollbar-thumb { background: var(--border); }

.chat-wrap { position: relative; overflow: hidden; }
.chat-item {
  padding: 10px 14px; cursor: pointer;
  border-left: 2px solid transparent;
  transition: background 0.1s, border-color 0.1s, transform 0.2s;
  user-select: none;
}
.chat-item:active { background: #1e1e1e; }
.chat-item.active { background: #1a1a1a; border-left-color: var(--accent); }
.chat-item-title {
  font-size: 13px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.chat-item.active .chat-item-title { color: var(--accent); }
.chat-item-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }

.chat-del-btn {
  position: absolute; right: 0; top: 0; bottom: 0; width: 72px;
  background: var(--red); border: none; color: #fff;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
  cursor: pointer; transform: translateX(100%); transition: transform 0.2s;
}
.chat-wrap.swiped .chat-del-btn { transform: translateX(0); }
.chat-wrap.swiped .chat-item { transform: translateX(-72px); }

/* SIDEBAR FOOTER */
.sb-footer {
  border-top: 1px solid var(--border);
  padding: 10px 14px 14px; flex-shrink: 0;
}
.storage-bar {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-bottom: 8px;
}
.backup-btns { display: flex; gap: 6px; }
.btn-backup {
  flex: 1; background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; padding: 6px 4px;
  cursor: pointer; text-align: center;
  transition: all 0.15s; display: block; letter-spacing: 0.02em;
}
.btn-backup:active { border-color: var(--accent2); color: var(--accent2); }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }

/* HEADER */
header {
  display: flex; align-items: center;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; gap: 7px;
}
.btn-menu {
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; color: var(--muted);
  font-size: 15px; width: 34px; height: 34px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.btn-menu:active { border-color: var(--accent); color: var(--accent); }

.header-title {
  flex: 1; font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: 'IBM Plex Mono', monospace;
}
.header-title span { color: var(--text); }

.header-btns { display: flex; gap: 5px; flex-shrink: 0; }
.btn-h {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px;
  padding: 4px 8px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; transition: all 0.15s; white-space: nowrap;
}
.btn-h:active { border-color: var(--accent); color: var(--accent); }
.btn-h.key-ok { border-color: var(--green) !important; color: var(--green) !important; }

/* MODEL SELECTOR */
#modelSelect {
  background: transparent; border: 1px solid var(--border);
  color: var(--accent2); border-radius: 4px;
  padding: 4px 6px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.03em;
  outline: none; transition: border-color 0.15s;
  -webkit-appearance: none; appearance: none;
  text-align: center;
}
#modelSelect:focus { border-color: var(--accent2); }
#modelSelect option { background: #1a1a1a; color: var(--text); }

/* PANELS */
.panel-wrap {
  border-bottom: 1px solid var(--border);
  background: #0c0c0c; overflow: hidden;
  max-height: 0; transition: max-height 0.26s ease; flex-shrink: 0;
}
.panel-wrap.open { max-height: 180px; }
.panel-inner { padding: 10px 14px 12px; }
.panel-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 7px;
}
.panel-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
.panel-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  padding: 7px 10px; outline: none; transition: border-color 0.15s;
}
.panel-input:focus { border-color: var(--accent2); }
.panel-textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 13px;
  padding: 8px 10px; resize: none; height: 72px;
  outline: none; transition: border-color 0.15s; line-height: 1.5;
}
.panel-textarea:focus { border-color: var(--accent); }
.panel-textarea::placeholder { color: var(--muted); }
.btn-panel-ok {
  background: var(--accent2); border: none; border-radius: 4px;
  color: #0e0e0e; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600;
  padding: 7px 12px; white-space: nowrap;
}
.panel-note {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted);
}
.panel-note.ok { color: var(--green); }

/* STATUS BAR */
#statusBar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 14px; background: var(--bg);
  border-bottom: 1px solid #191919; flex-shrink: 0;
}
#statusBar span { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
.s-hi { color: var(--accent2) !important; }

/* MESSAGES */
#messages {
  flex: 1; overflow-y: auto; padding: 14px 13px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth; overscroll-behavior: contain;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
  margin: auto; text-align: center; opacity: 0.3; padding: 40px 20px;
}
.empty-big {
  font-family: 'IBM Plex Mono', monospace; font-size: 80px; font-weight: 600;
  color: var(--accent); line-height: 1; display: block; margin-bottom: 10px;
}
.empty-state p { font-size: 13px; color: var(--muted); }

.msg { display: flex; flex-direction: column; gap: 3px; animation: fadeUp 0.16s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0 3px;
}
.msg.user .msg-label { color: var(--accent); }
.msg.assistant .msg-label { color: var(--accent2); }

.msg-body {
  background: #1c1c1c; border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  font-size: 14px; line-height: 1.65; word-break: break-word;
}
.msg.assistant .msg-body { background: var(--surface2); border-color: #1e1e1e; }
.msg-body strong { color: var(--accent); font-weight: 500; }
.msg-body em { color: #aaa; font-style: italic; }
.msg-body code {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  background: #1e1e1e; padding: 1px 5px; border-radius: 3px; color: var(--accent2);
}
.msg-body pre {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  background: #131313; border: 1px solid var(--border);
  border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; color: #ccc;
}
.msg-body ul, .msg-body ol { padding-left: 18px; margin: 4px 0; }
.msg-body li { margin-bottom: 2px; }
.msg-body p { margin-bottom: 6px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body h3 { font-size: 13px; color: var(--accent); font-weight: 600; margin: 6px 0 3px; }
.msg-body h2 { font-size: 14px; color: var(--accent); font-weight: 600; margin: 8px 0 4px; }
.msg-body h1 { font-size: 15px; color: var(--accent); font-weight: 600; margin: 8px 0 4px; }

/* TYPING */
.typing-dot {
  display: flex; align-items: center; gap: 4px;
  padding: 12px 13px; background: var(--surface2);
  border: 1px solid #1e1e1e; border-radius: 6px; width: fit-content;
}
.typing-dot span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent2); animation: tdot 1.2s infinite; opacity: 0.4;
}
.typing-dot span:nth-child(2) { animation-delay: 0.18s; }
.typing-dot span:nth-child(3) { animation-delay: 0.36s; }
@keyframes tdot {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* INPUT */
.input-zone {
  flex-shrink: 0; border-top: 1px solid var(--border);
  background: var(--surface); padding: 9px 12px;
}
.input-row { display: flex; gap: 7px; align-items: flex-end; }
#userInput {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 14px;
  padding: 9px 11px; resize: none; min-height: 40px; max-height: 120px;
  outline: none; transition: border-color 0.15s; line-height: 1.5;
}
#userInput:focus { border-color: var(--accent); }
#userInput::placeholder { color: var(--muted); }
#sendBtn {
  background: var(--accent); border: none; border-radius: 6px;
  color: #0e0e0e; cursor: pointer; font-size: 18px; font-weight: 700;
  width: 40px; height: 40px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s;
}
#sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
#sendBtn:active:not(:disabled) { opacity: 0.7; }
.input-hint { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 5px; }

/* TOAST */
#toast {
  position: fixed; bottom: 86px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1e1e1e; border: 1px solid var(--accent);
  color: var(--accent); font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; padding: 7px 16px; border-radius: 4px;
  opacity: 0; transition: all 0.2s; pointer-events: none;
  white-space: nowrap; z-index: 200;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* INSTALL BANNER */
#installBanner {
  display: none; background: #1a1f1a; border-bottom: 1px solid var(--green);
  padding: 8px 14px; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#installBanner.show { display: flex; }
#installBanner span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--green); }
.btn-install {
  background: var(--green); border: none; border-radius: 4px;
  color: #0e0e0e; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 600; padding: 5px 12px; cursor: pointer;
}
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-header">
      <span class="sb-title">История</span>
      <button class="btn-new-chat" onclick="newChat()">+ Новый</button>
    </div>
    <div id="chatList"></div>
    <div class="sb-footer">
      <div class="storage-bar" id="storageBar">загрузка…</div>
      <div class="backup-btns">
        <button class="btn-backup" onclick="exportAll()">↓ Экспорт JSON</button>
        <label class="btn-backup">↑ Импорт JSON
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAll(event)">
        </label>
      </div>
    </div>
  </div>

  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div id="main">

    <!-- INSTALL BANNER -->
    <div id="installBanner">
      <span>📲 Установить как приложение</span>
      <button class="btn-install" onclick="installPWA()">Установить</button>
    </div>

    <header>
      <button class="btn-menu" onclick="toggleSidebar()">☰</button>
      <div class="header-title" id="headerTitle"><span>Новый чат</span></div>
      <div class="header-btns">
        <select id="modelSelect" title="Модель Claude">
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-opus-4-5">Opus 4</option>
        </select>
        <button class="btn-h" id="apiBtn" onclick="togglePanel('api')">⚿ key</button>
        <button class="btn-h" onclick="togglePanel('sys')">⚙ sys</button>
        <button class="btn-h" onclick="newChat()">+</button>
      </div>
    </header>

    <!-- API KEY PANEL -->
    <div class="panel-wrap" id="panelApi">
      <div class="panel-inner">
        <div class="panel-label" style="color:var(--accent2)">Anthropic API Key</div>
        <div class="panel-row">
          <input type="password" class="panel-input" id="apiKeyInput" placeholder="sk-ant-...">
          <button class="btn-panel-ok" onclick="saveApiKey()">Сохранить</button>
        </div>
        <div class="panel-note" id="keyStatus">ключ не сохранён</div>
      </div>
    </div>

    <!-- SYSTEM PROMPT PANEL -->
    <div class="panel-wrap" id="panelSys">
      <div class="panel-inner">
        <div class="panel-label" style="color:var(--accent)">Системный промпт</div>
        <textarea class="panel-textarea" id="sysPrompt"
          placeholder="Например: Отвечай кратко, по делу, на русском языке."></textarea>
      </div>
    </div>

    <div id="statusBar">
      <span>сообщений: <span class="s-hi" id="msgCount">0</span></span>
      <span id="chatDate">—</span>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">
        <span class="empty-big">C</span>
        <p>Напиши первое сообщение</p>
      </div>
    </div>

    <div class="input-zone">
      <div class="input-row">
        <textarea id="userInput" placeholder="Сообщение…" rows="1"></textarea>
        <button id="sendBtn" onclick="sendMsg()">↑</button>
      </div>
      <div class="input-hint">Ctrl+Enter — отправить</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const API_URL   = 'https://api.anthropic.com/v1/messages';
const APIKEY_LS = 'claude_api_key';
const MODEL_LS  = 'claude_model';

// ════════════════════════════════════════
//  INDEXEDDB
// ════════════════════════════════════════
const DB_NAME = 'ClaudeChat';
const DB_VER  = 1;
const STORE   = 'chats';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const s = d.createObjectStore(STORE, { keyPath: 'id' });
        s.createIndex('updatedAt', 'updatedAt');
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = () => reject(req.error);
  });
}

function dbPut(chat) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(chat);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let currentId = null;
let history   = [];
let apiKey    = '';
let loading   = false;
let allChats  = [];   // cached list for sidebar
let deferredInstall = null;

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
async function init() {
  await openDB();
  apiKey = localStorage.getItem(APIKEY_LS) || '';
  const saved = localStorage.getItem(MODEL_LS);
  if (saved) document.getElementById('modelSelect').value = saved;

  updateKeyStatus();
  await refreshSidebar();
  setupInput();
  setupSwipe();
  setupPWA();
}

function setupInput() {
  const el = document.getElementById('userInput');
  el.addEventListener('input', () => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMsg(); }
  });
}

// Save selected model to localStorage
document.getElementById('modelSelect').addEventListener('change', function() {
  localStorage.setItem(MODEL_LS, this.value);
});

// ════════════════════════════════════════
//  CHAT MANAGEMENT
// ════════════════════════════════════════
function makeId() { return 'c' + Date.now() + Math.random().toString(36).slice(2, 6); }

async function persistCurrent() {
  if (!currentId || history.length === 0) return;
  const fu = history.find(m => m.role === 'user');
  const title = fu ? fu.content.slice(0, 55) + (fu.content.length > 55 ? '…' : '') : 'Без названия';
  const existing = allChats.find(c => c.id === currentId);
  const chat = {
    id: currentId, title,
    date: existing?.date || new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    messages: [...history],
    sysPrompt: document.getElementById('sysPrompt').value,
    model: document.getElementById('modelSelect').value
  };
  await dbPut(chat);
  await refreshSidebar();
}

async function newChat() {
  if (currentId && history.length > 0) await persistCurrent();
  currentId = makeId();
  history = [];
  document.getElementById('sysPrompt').value = '';
  renderMessages();
  updateMsgCount();
  setTitle('Новый чат');
  document.getElementById('chatDate').textContent = '—';
  await refreshSidebar();
  closeSidebar();
  document.getElementById('userInput').focus();
}

async function loadChat(id) {
  if (currentId && history.length > 0) await persistCurrent();
  const chat = allChats.find(c => c.id === id);
  if (!chat) return;
  currentId = id;
  history = [...chat.messages];
  document.getElementById('sysPrompt').value = chat.sysPrompt || '';
  if (chat.model) document.getElementById('modelSelect').value = chat.model;
  renderMessages(true);
  updateMsgCount();
  setTitle(chat.title);
  const d = new Date(chat.date);
  document.getElementById('chatDate').textContent =
    d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}) + ' ' +
    d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  await refreshSidebar();
  closeSidebar();
}

async function deleteChat(id, e) {
  e && e.stopPropagation();
  await dbDelete(id);
  if (currentId === id) {
    currentId = null; history = [];
    renderMessages(); updateMsgCount();
    setTitle('Новый чат');
    document.getElementById('chatDate').textContent = '—';
  }
  await refreshSidebar();
}

// ════════════════════════════════════════
//  SIDEBAR RENDER
// ════════════════════════════════════════
async function refreshSidebar() {
  allChats = await dbGetAll();
  allChats.sort((a, b) => new Date(b.updatedAt || b.date) - new Date(a.updatedAt || a.date));
  renderSidebar();
  updateStorageBar();
}

function renderSidebar() {
  const list = document.getElementById('chatList');
  if (!allChats.length) {
    list.innerHTML = '<div style="padding:16px 14px;font-size:12px;color:var(--muted);font-family:IBM Plex Mono,monospace">Нет сохранённых диалогов</div>';
    return;
  }
  list.innerHTML = allChats.map(c => {
    const d = new Date(c.updatedAt || c.date);
    const ds = d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'}) + ' ' +
               d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    const model = c.model?.includes('opus') ? '◈ opus' : '◇ sonnet';
    return `<div class="chat-wrap" id="wrap_${c.id}">
      <div class="chat-item${c.id === currentId ? ' active' : ''}" onclick="loadChat('${c.id}')">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-meta">${ds} · ${c.messages.length} сообщ. · ${model}</div>
      </div>
      <button class="chat-del-btn" onclick="deleteChat('${c.id}',event)">удалить</button>
    </div>`;
  }).join('');
  allChats.forEach(c => attachSwipeDel(c.id));
}

function attachSwipeDel(id) {
  const wrap = document.getElementById('wrap_' + id);
  if (!wrap) return;
  let sx = 0;
  wrap.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
  wrap.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - sx;
    if (dx < -38) wrap.classList.add('swiped');
    else if (dx > 10) wrap.classList.remove('swiped');
  }, {passive:true});
}

async function updateStorageBar() {
  const n = allChats.length;
  const totalMsgs = allChats.reduce((s, c) => s + c.messages.length, 0);
  document.getElementById('storageBar').textContent =
    `${n} диалог${n===1?'':n<5?'а':'ов'} · ${totalMsgs} сообщений · IndexedDB`;
}

// ════════════════════════════════════════
//  SIDEBAR TOGGLE
// ════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function setupSwipe() {
  let sx = 0, sy = 0, active = false;
  const main = document.getElementById('main');
  main.addEventListener('touchstart', e => {
    if (e.touches[0].clientX < 22) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; active = true; }
  }, {passive:true});
  main.addEventListener('touchmove', e => {
    if (!active) return;
    if (e.touches[0].clientX - sx > 44 && Math.abs(e.touches[0].clientY - sy) < 60) {
      toggleSidebar(); active = false;
    }
  }, {passive:true});
  main.addEventListener('touchend', () => { active = false; });
}

// ════════════════════════════════════════
//  PANELS
// ════════════════════════════════════════
function togglePanel(name) {
  const map = { api:'panelApi', sys:'panelSys' };
  const el = document.getElementById(map[name]);
  const wasOpen = el.classList.contains('open');
  Object.values(map).forEach(id => document.getElementById(id).classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}

// ════════════════════════════════════════
//  MESSAGES
// ════════════════════════════════════════
function renderMessages(scrollEnd = false) {
  const c = document.getElementById('messages');
  if (!history.length) {
    c.innerHTML = `<div class="empty-state" id="emptyState">
      <span class="empty-big">C</span><p>Напиши первое сообщение</p></div>`;
    return;
  }
  c.innerHTML = '';
  history.forEach(m => addMsgDOM(m.role, m.content, false));
  if (scrollEnd) requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

function addMsgDOM(role, text, anim = true) {
  const es = document.getElementById('emptyState');
  if (es) es.remove();
  const c = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (!anim) div.style.animation = 'none';
  div.innerHTML = `<div class="msg-label">${role==='user'?'▸ Ты':'◆ Claude'}</div>
    <div class="msg-body">${role==='assistant' ? fmtMd(text) : esc(text).replace(/\n/g,'<br>')}</div>`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg assistant'; d.id = 'typing'; d.style.animation = 'none';
  d.innerHTML = `<div class="msg-label">◆ Claude</div>
    <div class="typing-dot"><span></span><span></span><span></span></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

// ════════════════════════════════════════
//  SEND
// ════════════════════════════════════════
async function sendMsg() {
  const inp  = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text || loading) return;

  if (!apiKey) { togglePanel('api'); showToast('Введи API ключ'); return; }
  if (!currentId) currentId = makeId();

  loading = true;
  document.getElementById('sendBtn').disabled = true;
  inp.value = ''; inp.style.height = 'auto';

  addMsgDOM('user', text);
  history.push({ role: 'user', content: text });
  updateMsgCount();
  showTyping();

  const sys   = document.getElementById('sysPrompt').value.trim();
  const model = document.getElementById('modelSelect').value;

  try {
    const body = { model, max_tokens: 1024, messages: history };
    if (sys) body.system = sys;

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || 'HTTP ' + res.status);
    }

    const data  = await res.json();
    const reply = data.content?.[0]?.text || '(пустой ответ)';

    removeTyping();
    addMsgDOM('assistant', reply);
    history.push({ role: 'assistant', content: reply });
    updateMsgCount();

    const fu = history.find(m => m.role === 'user');
    if (fu) setTitle(fu.content.slice(0, 44) + (fu.content.length > 44 ? '…' : ''));

    await persistCurrent();

  } catch(err) {
    removeTyping();
    addMsgDOM('assistant', '⚠ Ошибка: ' + err.message);
    history.pop();
    updateMsgCount();
  }

  loading = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

// ════════════════════════════════════════
//  API KEY
// ════════════════════════════════════════
function saveApiKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val) {
    apiKey = val;
    localStorage.setItem(APIKEY_LS, val);
    document.getElementById('apiKeyInput').value = '';
    showToast('Ключ сохранён');
    document.getElementById('panelApi').classList.remove('open');
  } else {
    apiKey = '';
    localStorage.removeItem(APIKEY_LS);
    showToast('Ключ удалён');
  }
  updateKeyStatus();
}

function updateKeyStatus() {
  const st  = document.getElementById('keyStatus');
  const btn = document.getElementById('apiBtn');
  if (apiKey) {
    st.textContent = '✓ ' + apiKey.slice(0, 16) + '…';
    st.className = 'panel-note ok';
    btn.classList.add('key-ok');
    document.getElementById('apiKeyInput').placeholder = apiKey.slice(0,16) + '… (введи новый чтобы заменить)';
  } else {
    st.textContent = 'ключ не сохранён';
    st.className = 'panel-note';
    btn.classList.remove('key-ok');
  }
}

// ════════════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════════════
async function exportAll() {
  const chats = await dbGetAll();
  if (!chats.length) { showToast('Нет диалогов для экспорта'); return; }
  const payload = {
    version: 2, exportedAt: new Date().toISOString(),
    device: navigator.userAgent.slice(0, 60),
    chats
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'claude-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Экспортировано: ${chats.length} диалог${chats.length===1?'':chats.length<5?'а':'ов'}`);
}

function importAll(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      const list = Array.isArray(payload) ? payload
                 : payload.chats ? Object.values(payload.chats).concat(payload.chats instanceof Array ? [] : [])
                 : [];
      const chats = payload.chats
        ? (Array.isArray(payload.chats) ? payload.chats : Object.values(payload.chats))
        : (Array.isArray(payload) ? payload : []);

      let count = 0;
      for (const c of chats) {
        if (c.id && c.messages) { await dbPut(c); count++; }
      }
      await refreshSidebar();
      showToast(`Импортировано: ${count} диалог${count===1?'':count<5?'а':'ов'}`);
    } catch(err) {
      showToast('⚠ Ошибка чтения файла');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════
//  PWA
// ════════════════════════════════════════
function setupPWA() {
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstall = e;
    document.getElementById('installBanner').classList.add('show');
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
    showToast('Приложение установлено!');
  });
}

async function installPWA() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
  deferredInstall = null;
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function updateMsgCount() { document.getElementById('msgCount').textContent = history.length; }
function setTitle(t) { document.getElementById('headerTitle').innerHTML = '<span>' + esc(t) + '</span>'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtMd(raw) {
  let s = esc(raw);
  // Code blocks (must come first)
  s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold / italic
  s = s.replace(/\*\*\*([^*\n]+)\*\*\*/g, '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Headers
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Lists
  s = s.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>.*?<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  // Paragraphs
  s = s.replace(/\n\n+/g, '</p><p>');
  s = s.replace(/\n/g, '<br>');
  return '<p>' + s + '</p>';
}
